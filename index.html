<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liar's Bar - Royal Final Platinum Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+TC:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; --gold-l: #f9e29f; --gold-d: #8a6d3b;
            --bg: #050505; --panel: rgba(20, 20, 25, 0.95);
            --border: rgba(212, 175, 55, 0.3);
            --card-w: 80px; --card-h: 120px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background: var(--bg); background-image: radial-gradient(circle at center, #15151a 0%, #050505 100%);
            color: white; font-family: 'Noto Sans TC', sans-serif; margin: 0; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; 
        }

        body::after { content: ""; position: fixed; inset: 0; opacity: 0.03; pointer-events: none; background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }

        /* --- 1. 奢華大廳 --- */
        .lobby-screen { position: fixed; inset: 0; z-index: 101; background: var(--bg); display: flex; align-items: center; justify-content: center; }
        .lobby-container { position: relative; background: var(--panel); border: 1px solid var(--gold); border-radius: 30px; padding: 40px 30px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.8); backdrop-filter: blur(20px); }
        .lobby-logo { font-family: 'Cinzel'; font-size: 2.8rem; color: var(--gold); margin-bottom: 35px; text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); letter-spacing: 4px; }
        .input-group { position: relative; margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; font-family: 'Cinzel'; font-size: 0.75rem; color: var(--gold-l); margin-bottom: 8px; margin-left: 10px; }
        .lobby-input { width: 100%; padding: 15px 20px; background: #000; border: 1px solid #333; border-radius: 15px; color: var(--gold); font-family: 'Noto Sans TC'; font-size: 1.1rem; text-align: center; }
        .main-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); border: none; border-radius: 15px; color: #000; font-family: 'Cinzel'; font-weight: 900; font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.4); margin-bottom: 10px; }
        .sub-btn { width: 100%; padding: 14px; background: transparent; border: 1px solid var(--border); border-radius: 15px; color: var(--gold-l); font-family: 'Cinzel'; cursor: pointer; }

        /* --- 2. 選角介面 --- */
        .setup-screen { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(15px); }
        .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .role-card { background: linear-gradient(145deg, #1a1a20, #0a0a0c); border: 1px solid var(--border); border-radius: 20px; padding: 20px 10px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .role-card.taken { opacity: 0.2; filter: grayscale(1); }
        .role-card.me { border: 2.5px solid var(--gold); box-shadow: 0 0 25px rgba(212, 175, 55, 0.4); transform: scale(1.05); }
        .role-emoji { font-size: 2.5rem; display: block; margin-bottom: 8px; filter: drop-shadow(0 5px 10px #000); }
        .role-name { font-family: 'Cinzel'; font-weight: 900; color: var(--gold-l); font-size: 0.8rem; }

        /* --- 3. 遊戲畫面 --- */
        .game-screen { display: none; flex-direction: column; height: 100dvh; }
        .my-turn-glow { position: fixed; inset: 0; pointer-events: none; z-index: 5; transition: 0.5s; }
        .active-turn .my-turn-glow { animation: border-breath 2s infinite alternate; }
        @keyframes border-breath { from { box-shadow: inset 0 0 20px rgba(212, 175, 55, 0.1); } to { box-shadow: inset 0 0 80px rgba(212, 175, 55, 0.45); } }

        .header-panel { padding: 12px; background: linear-gradient(to bottom, #000, transparent); text-align: center; border-bottom: 1px solid var(--border); }
        #target-display { font-family: 'Cinzel'; font-size: 3.5rem; color: var(--gold); font-weight: 900; line-height: 1; text-shadow: 0 0 20px var(--gold-d); }
        .sequence-bar { font-size: 0.65rem; color: #777; background: rgba(0,0,0,0.6); padding: 6px; border-radius: 30px; margin: 8px auto; width: 90%; display: flex; justify-content: center; gap: 8px; border: 1px solid var(--border); }
        .seq-item.active { color: var(--gold-bright); font-weight: 900; text-shadow: 0 0 8px var(--gold); text-decoration: underline; }

        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; flex-shrink: 0; }
        .p-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 15px; padding: 10px; text-align: center; backdrop-filter: blur(5px); position: relative; }
        .p-box.active { border: 2.5px solid var(--gold); box-shadow: 0 0 15px var(--gold); background: rgba(212, 175, 55, 0.1); }
        .p-box.dead { opacity: 0.2; filter: grayscale(1); border-color: red; }

        /* --- 修復版手牌佈局 --- */
        #hand-area { background: linear-gradient(to top, #000 85%, #0d0d0f 100%); padding: 10px; border-radius: 40px 40px 0 0; border-top: 2px solid var(--gold); flex: 1; display: flex; flex-direction: column; justify-content: flex-end; position: relative; overflow: hidden; }
        .card-container { position: relative; width: 100%; height: 320px; display: flex; justify-content: center; align-items: flex-end; margin-bottom: 5px; }
        
        .card { 
            width: var(--card-w); height: var(--card-h); background: #fff; border-radius: 10px; color: #111; font-weight: 900; padding: 8px; display: flex; flex-direction: column; justify-content: space-between;
            position: absolute; /* 改用絕對定位座標 */
            left: 0; bottom: 0; /* 基礎座標為左下角，由 JS 計算精確偏移 */
            transition: all 0.45s cubic-bezier(0.23, 1, 0.32, 1); box-shadow: 0 8px 20px rgba(0,0,0,0.6); border: 1px solid #ccc; z-index: 10;
        }

        /* 選中牌：強制轉正、大間距、最頂層 */
        .card.selected { 
            z-index: 500 !important; border: 3px solid var(--gold); 
            box-shadow: 0 25px 50px rgba(212, 175, 55, 0.7); filter: brightness(1.1);
        }
        /* 沒選中牌：變淡、縮小 */
        .card.unfocused { opacity: 0.35; filter: grayscale(0.5); transform-origin: bottom center; }

        .card.red { color: #d00; }
        .card.devil { border: 3.5px solid #f00 !important; box-shadow: 0 0 25px #f00 !important; animation: devil-pulse 1s infinite alternate; }
        @keyframes devil-pulse { from { box-shadow: 0 0 5px #f00; } to { box-shadow: 0 0 35px #f00; } }
        .card-flying { transform: translateY(-1000px) scale(0) rotate(45deg) !important; opacity: 0 !important; }

        .btn-group { display: flex; gap: 15px; padding: 10px; z-index: 600; background: rgba(0,0,0,0.5); }
        .action-btn { flex: 1; padding: 18px; border-radius: 15px; border: none; font-weight: 900; font-size: 1.2rem; font-family: 'Cinzel'; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.5); }
        .btn-play { background: var(--gold); color: #000; }
        .btn-liar { background: #8b0000; color: #fff; }
        .btn-disabled { opacity: 0.2; pointer-events: none; }

        /* --- 處決 UI --- */
        #execution-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; justify-content: center; align-items: center; }
        .aim-ui { width: 240px; height: 240px; border: 4px solid #f00; border-radius: 50%; position: relative; box-shadow: 0 0 30px rgba(255,0,0,0.5); }
        .aim-ui::before, .aim-ui::after { content: ''; position: absolute; background: #f00; box-shadow: 0 0 5px red; }
        .aim-ui::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
        .aim-ui::after { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
        .locking { animation: aim-lock 0.2s infinite alternate; border-color: #fff !important; }
        @keyframes aim-lock { from { transform: scale(1); } to { transform: scale(0.9); } }
        .safe-glow { border-color: #00ff00 !important; box-shadow: 0 0 50px #00ff00 !important; transform: scale(1.2); opacity: 0; transition: 0.6s; }
        .shaking { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(0,0); } 50% { transform: translate(-3.5px, 3.5px); } 100% { transform: translate(3.5px, -3.5px); } }
        #exe-status { font-family: 'Cinzel'; font-size: 2.8rem; margin-top: 40px; font-weight:900; letter-spacing:5px; }
    </style>
</head>
<body id="main-body">

    <div class="my-turn-glow"></div>

    <div id="lobby-screen" class="lobby-screen">
        <div class="lobby-container">
            <h1 class="lobby-logo">LIAR'S BAR</h1>
            <div class="input-group"><label>TABLE IDENTIFIER</label><input type="text" id="input-room-id" class="lobby-input" placeholder="ROOM ID"></div>
            <div class="input-group"><label>ACCESS PIN</label><input type="password" id="input-room-pw" class="lobby-input" placeholder="4-PIN" maxlength="4"></div>
            <button class="main-btn" onclick="handleRoomAction('join')">JOIN BAR</button>
            <button class="sub-btn" onclick="handleRoomAction('create')">HOST NEW TABLE</button>
        </div>
    </div>

    <div id="setup-screen" class="setup-screen" style="display:none;">
        <h2 style="color:var(--gold); font-family:'Cinzel'; margin-bottom:30px; letter-spacing:3px;">SELECT YOUR AVATAR</h2>
        <div id="role-grid" class="role-grid"></div>
        <button class="main-btn" id="start-trigger-btn" style="display:none; max-width:350px; margin-top:40px; background:#fff; color:#000;" onclick="masterAction()">🎲 Shuffle & Shuffle</button>
    </div>

    <div id="game-screen" class="game-screen">
        <div class="header-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <div id="my-id-label" style="background:var(--gold); color:#000; padding:3px 12px; border-radius:20px; font-weight:900; font-size:0.8rem;">FOX</div>
                <div id="room-tag" style="color:var(--gold-l); font-size:0.8rem; font-family:'Cinzel';">ROOM: --</div>
            </div>
            <div id="target-display">?</div>
            <div class="sequence-bar" id="sequence-bar">Waiting...</div>
            <div style="display:flex; gap:10px;">
                <button class="sub-btn" style="margin:0; flex:1; padding:5px; font-size:0.6rem; border-color:#555;" onclick="confirmReset('GAME')">🔄 RESET ROLES</button>
                <button class="sub-btn" style="margin:0; flex:1; padding:5px; font-size:0.6rem; background:rgba(255,255,255,0.1); border-color:#555;" onclick="confirmReset('DEAL')">🃏 REDEAL</button>
            </div>
        </div>
        <div class="player-grid" id="player-grid"></div>
        <div id="sys-msg" style="text-align:center; font-size:0.75rem; color:#aaa; font-style:italic; height:1.1rem;">System Ready...</div>
        <div id="hand-area">
            <div id="stack-msg" style="text-align:center; color:var(--gold); font-size:0.9rem; font-weight:900; margin-bottom:10px;">TABLE: 0 CARDS</div>
            <div class="card-container" id="my-hand"></div>
            <div class="btn-group">
                <button id="btn-liar" class="action-btn btn-liar" onclick="callLiar()">LIAR!</button>
                <button id="btn-play" class="action-btn btn-play" onclick="playCards()">PLAY (0)</button>
            </div>
        </div>
    </div>

    <div id="execution-overlay">
        <div id="blood-vignette" style="position:absolute; inset:0; background:radial-gradient(circle, transparent 20%, rgba(150,0,0,0.8) 100%); opacity:0; transition:0.3s;"></div>
        <div id="exe-avatar" style="font-size: 8rem; margin-bottom: 20px;"></div>
        <div id="aim-ui" class="aim-ui"></div>
        <div id="exe-status">TARGETING</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA1FOVVQ2g9Empp9wisqa5JTzigVrifGVQ",
            authDomain: "liars-bar-game-13e0f.firebaseapp.com",
            databaseURL: "https://liars-bar-game-13e0f-default-rtdb.firebaseio.com",
            projectId: "liars-bar-game-13e0f",
            storageBucket: "liars-bar-game-13e0f.firebasestorage.app",
            messagingSenderId: "526285952011",
            appId: "1:526285952011:web:6e54c464a5d0af93c5630e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const ROLES = [{id:0,name:"FOX 🦊",emoji:"🦊"},{id:1,name:"LEOPARD 🐆",emoji:"🐆"},{id:2,name:"SLOTH 🦥",emoji:"🦥"},{id:3,name:"ZEBRA 🦓",emoji:"🦓"},{id:4,name:"BEAR 🐻",emoji:"🐻"},{id:5,name:"WOLF 🐺",emoji:"🐺"}];
        const SUITS = ['♠','♥','♦','♣'];
        
        let currentRoomId = null; let myIdx = null; let roomRef = null; let selectedIndices = []; let isAnimating = false;
        const audio = { liar: () => playTone(600, 0.4), shot: () => playGunshot(), safe: () => playTone(440, 0.2), heartbeat: (rate) => playTone(55, 0.12, rate) };

        function playGunshot() {
            try {
                const ctx = new AudioContext();
                const osc = ctx.createOscillator(); const gT = ctx.createGain(); osc.type = 'triangle';
                osc.frequency.setValueAtTime(180, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.15);
                gT.gain.setValueAtTime(1.8, ctx.currentTime); gT.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
                osc.connect(gT); gT.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.25);
                const buf = ctx.createBuffer(1, ctx.sampleRate * 1.5, ctx.sampleRate); const d = buf.getChannelData(0); for (let i = 0; i < buffer.length; i++) d[i] = Math.random() * 2 - 1;
                const noise = ctx.createBufferSource(); noise.buffer = buf; const gN = ctx.createGain();
                gN.gain.setValueAtTime(1.0, ctx.currentTime); gN.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
                const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.setValueAtTime(9000, ctx.currentTime); f.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.4);
                noise.connect(f); f.connect(gN); gN.connect(ctx.destination); noise.start();
            } catch (e) {}
        }

        async function handleRoomAction(action) {
            const rid = document.getElementById('input-room-id').value.trim().toUpperCase();
            const rpw = document.getElementById('input-room-pw').value.trim();
            if (!rid || rpw.length !== 4) { alert("PIN required."); return; }
            const ref = db.ref('rooms/' + rid);
            const snap = await ref.once('value'); const data = snap.val();
            const isEmpty = !data || !data.players || data.players.every(p => !p.isJoined);
            if (action === 'create') {
                if (!isEmpty) { alert("Room Active."); return; }
                await ref.set({ password: rpw, state: 'LOBBY', players: ROLES.map(r => ({ ...r, isJoined: false, isDead: true, chamber: [], bulletIdx: 0, hand: [] })), targetCard: '?', currentTurn: -1, starterIdx: -1, lastPlayer: -1, lastPlayed: [] });
                enterSetup(rid);
            } else {
                if (!data || data.password !== rpw) { alert("Error."); return; }
                enterSetup(rid);
            }
        }

        function enterSetup(rid) {
            currentRoomId = rid; roomRef = db.ref('rooms/' + rid);
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'flex';
            document.getElementById('room-tag').innerText = `ROOM: ${rid}`;
            roomRef.on('value', snap => { const data = snap.val(); if(!data) return; updateSetupUI(data); if(myIdx !== null) syncGame(data); });
        }

        function updateSetupUI(data) {
            const grid = document.getElementById('role-grid'); grid.innerHTML = '';
            data.players.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = `role-card ${p.isJoined ? 'taken' : ''} ${myIdx === i ? 'me' : ''}`;
                card.innerHTML = `<span class="role-emoji">${p.emoji}</span><span class="role-name">${p.name}</span>`;
                if(!p.isJoined && myIdx === null) card.onclick = () => tryJoin(i);
                grid.appendChild(card);
            });
            const joinedCount = data.players.filter(p => p.isJoined).length;
            document.getElementById('start-trigger-btn').style.display = (myIdx !== null && joinedCount >= 2) ? 'block' : 'none';
        }

        function tryJoin(idx) {
            roomRef.child('players').child(idx).transaction(p => { if (p && p.isJoined) return; return { ...p, isJoined: true, isDead: false }; }, (err, committed) => { if (committed) { myIdx = idx; document.getElementById('my-id-label').innerText = ROLES[idx].name; roomRef.child('players').child(idx).child('isJoined').onDisconnect().set(false); } });
        }

        function masterAction() {
            roomRef.once('value', s => {
                const data = s.val(); roomRef.update({ state: 'ANIMATING' });
                setTimeout(() => {
                    const target = ['Q', 'K', 'A'][Math.floor(Math.random()*3)];
                    const joinedIndices = data.players.map((p,i) => p.isJoined ? i : -1).filter(i=>i!==-1);
                    const starter = joinedIndices[Math.floor(Math.random()*joinedIndices.length)];
                    
                    let deck = [];
                    const pCount = joinedIndices.length;
                    const baseCount = Math.max(6, pCount * 2); 
                    ['Q','K','A'].forEach(v => { for(let i=0; i<baseCount; i++) deck.push({ v, s: SUITS[i%4], isDevil: false }); });
                    for(let i=0; i<Math.ceil(pCount/2)+1; i++) deck.push({ v: 'J', s: '🃏', isDevil: false });
                    
                    const devilCandidateIdx = deck.map((c,i) => (c.v === target) ? i : -1).filter(i=>i!==-1);
                    if(devilCandidateIdx.length > 0) deck[devilCandidateIdx[Math.floor(Math.random()*devilCandidateIdx.length)]].isDevil = true;
                    deck = deck.sort(() => Math.random() - 0.5);

                    data.players.forEach((p, i) => {
                        if(p.isJoined && !p.isDead) {
                            p.hand = deck.splice(0, 5);
                            if(!p.chamber || p.chamber.length === 0) {
                                p.chamber = [0,0,0,0,0,0]; p.chamber[Math.floor(Math.random()*6)] = 1;
                                p.bulletIdx = 0;
                            }
                        }
                    });

                    data.state = 'PLAYING'; data.targetCard = target; data.currentTurn = starter; data.starterIdx = starter; data.lastPlayer = -1; data.lastPlayed = []; data.log = `Table: ${target}. ${ROLES[starter].name}'s Turn.`;
                    roomRef.set(data);
                }, 2000);
            });
        }

        function syncGame(data) {
            if(data.state === 'LOBBY') return;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            
            const myTurn = (data.currentTurn === myIdx && data.state === 'PLAYING');
            document.getElementById('main-body').className = myTurn ? 'active-turn' : '';

            if(data.state === 'ANIMATING') { document.getElementById('target-display').innerText = ['Q','K','A'][Math.floor(Date.now()/100)%3]; return; }
            document.getElementById('target-display').innerText = data.targetCard;
            document.getElementById('sys-msg').innerText = data.log;
            document.getElementById('stack-msg').innerText = `TABLE: ${data.lastPlayed ? data.lastPlayed.length : 0} CARDS`;

            // 顯示順序
            if(data.starterIdx !== -1) {
                let seq = []; const joined = data.players.map((p,i)=>p.isJoined?i:-1).filter(i=>i!==-1);
                for(let i=0; i<6; i++) {
                    const idx = (data.starterIdx + i) % 6; if(!data.players[idx].isJoined || data.players[idx].isDead) continue;
                    const cls = (data.currentTurn === idx) ? "class='seq-item active'" : "class='seq-item'";
                    seq.push(`<span ${cls}>${ROLES[idx].emoji}</span>`);
                }
                document.getElementById('sequence-bar').innerHTML = seq.join(' ➔ ');
            }

            const grid = document.getElementById('player-grid'); grid.innerHTML = '';
            data.players.forEach((p, i) => { 
                if(!p.isJoined) return; 
                const div = document.createElement('div'); div.className = `p-box ${data.currentTurn === i ? 'active' : ''} ${p.isDead ? 'dead' : ''}`;
                div.innerHTML = `<div style="font-size:2rem">${p.emoji}</div><div style="font-weight:900; font-size:0.8rem;">${p.name}</div><div style="font-size:0.6rem; color:#f44; font-weight:900;">${p.bulletIdx}/6 SPENT</div>`;
                grid.appendChild(div);
            });

            // --- 修復版絕對座標手牌邏輯 ---
            const me = data.players[myIdx]; const handDiv = document.getElementById('my-hand'); handDiv.innerHTML = '';
            if(me && me.hand && !me.isDead) {
                const total = me.hand.length;
                const hasSelected = selectedIndices.length > 0;
                const containerWidth = handDiv.clientWidth;
                const centerX = containerWidth / 2;

                me.hand.forEach((card, i) => {
                    const isSelected = selectedIndices.includes(i);
                    const cDiv = document.createElement('div');
                    const isRed = (card.s === '♥' || card.s === '♦' || card.isDevil);
                    cDiv.className = `card ${isRed?'red':''} ${card.isDevil?'devil':''} ${isSelected?'selected':''} ${hasSelected && !isSelected ? 'unfocused' : ''}`;
                    
                    let finalLeft, finalBottom, finalRotate;

                    if (isSelected) {
                        const sOrder = selectedIndices.indexOf(i); 
                        const sCount = selectedIndices.length;
                        // 選中區：頂層水平排開，間距 110px，徹底不遮擋
                        finalLeft = centerX + (sOrder - (sCount - 1) / 2) * 110;
                        finalBottom = 150; // 統一高度
                        finalRotate = 0;
                        cDiv.style.zIndex = 1000 + sOrder;
                    } else {
                        // 手牌區：扇形排開，間距 30px
                        finalLeft = centerX + (i - (total - 1) / 2) * 30;
                        finalBottom = 10;
                        finalRotate = (i - (total - 1) / 2) * 12;
                        cDiv.style.zIndex = 100 + i;
                    }

                    // 強制套用精確位移
                    cDiv.style.left = `${finalLeft}px`;
                    cDiv.style.bottom = `${finalBottom}px`;
                    cDiv.style.transform = `rotate(${finalRotate}deg)`;

                    cDiv.innerHTML = `<div>${card.v}</div><div style="font-size:1.8rem; align-self:center;">${card.s}</div><div style="transform:rotate(180deg)">${card.v}</div>`;
                    cDiv.onclick = () => { if(isSelected) selectedIndices = selectedIndices.filter(x => x !== i); else { if(card.isDevil && selectedIndices.length > 0) return; if(!card.isDevil && selectedIndices.some(idx => me.hand[idx].isDevil)) return; if(selectedIndices.length < 3) selectedIndices.push(i); } syncGame(data); };
                    handDiv.appendChild(cDiv);
                });
            }

            const othersEmpty = data.players.every((p, i) => i === myIdx || !p.isJoined || p.isDead || (p.hand && p.hand.length === 0));
            document.getElementById('btn-play').disabled = !myTurn || othersEmpty;
            document.getElementById('btn-liar').disabled = (!myTurn || data.lastPlayer === -1);
            if(data.shooting && !isAnimating) runExecutionSequence(data.shooting);
        }

        async function runExecutionSequence(shooting) {
            isAnimating = true; const overlay = document.getElementById('execution-overlay'); const aim = document.getElementById('aim-ui'); const status = document.getElementById('exe-status'); const blood = document.getElementById('blood-vignette');
            overlay.style.display = 'flex';
            for(let vIdx of shooting.victims) {
                document.getElementById('exe-avatar').innerText = ROLES[vIdx].emoji;
                status.innerText = "TARGETING"; status.style.color = "white"; aim.className = "aim-ui"; blood.style.opacity = 0; audio.heartbeat(0.4); await new Promise(r => setTimeout(r, 1000));
                status.innerText = "LOCKING ON"; status.style.color = "yellow"; aim.classList.add('locking'); overlay.classList.add('shaking'); audio.heartbeat(1.2); await new Promise(r => setTimeout(r, 1200));
                if(shooting.results[vIdx]) {
                    playGunshot(); status.innerText = "ELIMINATED"; status.style.color = "#ff0000"; blood.style.opacity = 1; overlay.style.background = "rgba(139, 0, 0, 0.4)"; setTimeout(() => overlay.style.background = "#000", 200); await new Promise(r => setTimeout(r, 1500));
                } else {
                    overlay.classList.remove('shaking'); aim.classList.remove('locking'); aim.classList.add('safe-glow'); audio.safe(); status.innerText = "S A F E"; status.style.color = "#00ff00"; await new Promise(r => setTimeout(r, 1500));
                }
                aim.className = "aim-ui"; overlay.style.background = "#000";
            }
            overlay.style.display = 'none'; isAnimating = false; const snap = await roomRef.child('players').once('value');
            if(myIdx === snap.val().findIndex(p=>p.isJoined)) { roomRef.child('shooting').remove(); setTimeout(() => masterAction(), 500); }
        }

        function playCards() {
            if(selectedIndices.length === 0) return;
            document.querySelectorAll('.card.selected').forEach(el => el.classList.add('card-flying'));
            setTimeout(() => {
                roomRef.once('value', s => {
                    const data = s.val(); const p = data.players[myIdx]; const played = [];
                    selectedIndices.sort((a,b)=>b-a).forEach(i => played.push(p.hand.splice(i,1)[0]));
                    data.lastPlayed = played; data.lastPlayer = myIdx; data.currentTurn = getNextAlive(data.players, myIdx);
                    data.log = `${ROLES[myIdx].name} played ${played.length} cards.`; selectedIndices = []; roomRef.set(data);
                });
            }, 300);
        }

        function callLiar() {
            audio.liar(); roomRef.once('value', s => {
                const data = s.val(); const cards = data.lastPlayed; const isLie = cards.some(c => c.v !== data.targetCard && c.v !== 'J' && !c.isDevil); const hasDevil = cards.some(c => c.isDevil);
                let victims = hasDevil ? data.players.map((p,i) => (p.isJoined && !p.isDead && i !== data.lastPlayer) ? i : -1).filter(i=>i!==-1) : (isLie ? [data.lastPlayer] : [myIdx]);
                const results = {}; victims.forEach(v => { const p = data.players[v]; const hit = p.chamber[p.bulletIdx] === 1; results[v] = hit; p.bulletIdx++; if(hit) p.isDead = true; });
                data.shooting = { victims, results }; roomRef.set(data);
            });
        }
        function getNextAlive(players, current) { let next = (current + 1) % 6; while(!players[next].isJoined || players[next].isDead) next = (next + 1) % 6; return next; }
        function confirmReset(type) { if(confirm(`Reset?`)) { if(type === 'GAME') { roomRef.update({ state: 'LOBBY', lastPlayed: [], shooting: null }); location.reload(); } else masterAction(); } }
        function playTone(f, d, rate = 1) { try { const c = new AudioContext(); if (rate > 1) { for(let i=0; i<rate*2.5; i++) { const o = c.createOscillator(); const g = c.createGain(); o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + (i*0.25) + d); o.connect(g); g.connect(c.destination); o.start(c.currentTime + (i*0.25)); o.stop(c.currentTime + (i*0.25) + d); } } else { const o = c.createOscillator(); const g = c.createGain(); o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + d); o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime + d); } } catch(e){} }
    </script>
</body>
