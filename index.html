<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liar's Bar Royal - Room Edition</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --crimson: #8b0000; --bg: #050506; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: white; font-family: 'Noto Sans TC', sans-serif; margin: 0; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; }

        /* --- 大廳畫面 --- */
        .lobby-screen { position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1c 0%, #050506 100%); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .lobby-card { background: #111; padding: 25px; border-radius: 15px; border: 1px solid var(--gold); width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; font-size: 1rem; text-align: center; }
        .primary-btn { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 8px; font-weight: 900; cursor: pointer; margin-top: 10px; }
        .secondary-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid #666; color: #aaa; border-radius: 8px; margin-top: 10px; cursor: pointer; }

        /* --- 角色選擇 --- */
        .setup-screen { display: none; padding: 20px; text-align: center; flex: 1; flex-direction: column; align-items: center; background: #050506; }
        .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 400px; margin-top: 20px; }
        .role-btn { background: #2a2a2c; border: 1px solid #444; color: white; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .role-btn.taken { border-color: #ff0000; color: #777; background: #111; }

        /* --- 遊戲主畫面 --- */
        .game-screen { display: none; flex-direction: column; height: 100dvh; }
        .header-panel { padding: 8px; background: #000; border-bottom: 1px solid #333; text-align: center; }
        .info-row { display: flex; justify-content: center; gap: 8px; align-items: center; margin-bottom: 4px; }
        .tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: 900; }
        .tag-gold { background: var(--gold); color: black; }
        .tag-dark { background: #333; color: #fff; }
        
        #target-display { font-family: 'Cinzel'; font-size: 2.5rem; color: var(--gold); height: 2.8rem; display: flex; align-items: center; justify-content: center; }
        .sequence-bar { font-size: 0.55rem; color: #888; background: #111; padding: 5px; border-radius: 20px; margin: 4px auto; width: 95%; display: flex; justify-content: center; gap: 5px; }
        .seq-item.active { color: var(--gold); font-weight: 900; transform: scale(1.1); }

        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 8px; }
        .p-box { background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 10px; padding: 6px; height: 80px; text-align: center; transition: 0.3s; }
        .p-box.active { border-color: var(--gold); background: rgba(212, 175, 55, 0.15); }
        .p-box.dead { opacity: 0.2; filter: grayscale(1); }

        /* 手牌區 */
        #hand-area { background: #111; padding: 10px; border-radius: 20px 20px 0 0; flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .card-scroll { display: flex; overflow-x: auto; gap: 8px; padding: 10px 5px; flex: 1; align-items: center; }
        .card { flex: 0 0 62px; height: 90px; background: white; color: black; border-radius: 8px; padding: 5px; display: flex; flex-direction: column; justify-content: space-between; font-weight: 900; border: 2px solid transparent; }
        .card.red { color: #d40000; }
        .card.selected { border-color: var(--gold); transform: translateY(-10px); box-shadow: 0 0 10px var(--gold); }
        
        .btn-group { display: flex; gap: 8px; padding: 5px 0; }
        .action-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 900; font-size: 1rem; cursor: pointer; }
        .btn-play { background: var(--gold); color: black; }
        .btn-liar { background: var(--crimson); color: white; }
        .host-panel { background: #222; padding: 10px; border-top: 1px solid #444; display: none; }

        /* 動畫 */
        #execution-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <!-- 第一層：大廳（創建/加入房間） -->
    <div id="lobby-screen" class="lobby-screen">
        <h1 style="color:var(--gold); font-family:'Cinzel';">LIAR'S BAR</h1>
        <div class="lobby-card">
            <input type="text" id="input-room-id" placeholder="房間號碼 (中英文)">
            <input type="password" id="input-room-pw" placeholder="房間密碼 (4位數字)" maxlength="4">
            <button class="primary-btn" onclick="handleRoomAction('join')">進入房間</button>
            <button class="secondary-btn" onclick="handleRoomAction('create')">創建新房間</button>
        </div>
    </div>

    <!-- 第二層：角色選擇 -->
    <div id="setup-screen" class="setup-screen">
        <h2 id="display-room-info" style="color:var(--gold); font-size: 1rem;">房間：--</h2>
        <div id="role-grid" class="role-grid"></div>
        <p style="color:#888; margin-top:15px;">請選擇角色以準備就緒</p>
        <button class="secondary-btn" style="max-width:200px" onclick="location.reload()">⬅ 返回大廳</button>
    </div>

    <!-- 第三層：遊戲畫面 -->
    <div id="game-screen" class="game-screen">
        <div class="header-panel">
            <div class="info-row">
                <div id="my-id-label" class="tag tag-gold">載入中...</div>
                <div id="room-tag" class="tag tag-dark">房間: --</div>
            </div>
            <div id="target-display">?</div>
            <div class="sequence-bar" id="sequence-bar">等待房主開始...</div>
        </div>

        <div class="player-grid" id="player-grid"></div>
        <div id="sys-msg" style="text-align:center; font-size:0.7rem; color:#888; margin:2px;">系統訊息</div>

        <div id="hand-area">
            <div id="stack-msg" style="text-align:center; color:var(--gold); font-size:0.8rem; font-weight:bold;">上家出了 0 張牌</div>
            <div class="card-scroll" id="my-hand"></div>
            <div class="btn-group">
                <button id="btn-liar" class="action-btn btn-liar" onclick="callLiar()">LIAR!</button>
                <button id="btn-play" class="action-btn btn-play" onclick="playCards()">出牌 (0)</button>
            </div>
            <!-- 房主控制面板 -->
            <div id="host-panel" class="host-panel">
                <button class="primary-btn" style="margin:0; background:#fff;" onclick="masterAction()">🎲 房主：洗牌並開始回合</button>
            </div>
        </div>
    </div>

    <!-- 處決動畫 -->
    <div id="execution-overlay">
        <div id="exe-avatar" style="font-size: 6rem;"></div>
        <div id="exe-status" style="font-family:'Cinzel'; font-size: 2rem; margin-top: 20px;">TARGETING...</div>
    </div>

    <script>
        // --- Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyA1FOVVQ2g9Empp9wisqa5JTzigVrifGVQ",
            authDomain: "liars-bar-game-13e0f.firebaseapp.com",
            databaseURL: "https://liars-bar-game-13e0f-default-rtdb.firebaseio.com",
            projectId: "liars-bar-game-13e0f",
            storageBucket: "liars-bar-game-13e0f.firebasestorage.app",
            messagingSenderId: "526285952011",
            appId: "1:526285952011:web:6e54c464a5d0af93c5630e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const ROLES = [
            { id: 0, name: "狐狸", emoji: "🦊" }, { id: 1, name: "豹子", emoji: "🐆" },
            { id: 2, name: "樹懶", emoji: "🦥" }, { id: 3, name: "斑馬", emoji: "🦓" },
            { id: 4, name: "熊熊", emoji: "🐻" }, { id: 5, name: "野狼", emoji: "🐺" }
        ];

        let currentRoomId = null;
        let myIdx = null;
        let isHost = false;
        let selectedIndices = [];
        let roomRef = null;

        // --- 1. 房間邏輯 ---
        function handleRoomAction(action) {
            const rid = document.getElementById('input-room-id').value.trim();
            const rpw = document.getElementById('input-room-pw').value.trim();

            if (!rid || rpw.length !== 4 || isNaN(rpw)) {
                alert("請輸入房間號與4位數字密碼！");
                return;
            }

            const ref = db.ref('rooms/' + rid);
            ref.once('value', snap => {
                const data = snap.val();
                if (action === 'create') {
                    if (data) { alert("房間號已存在！"); return; }
                    // 創建房間
                    ref.set({
                        password: rpw,
                        state: 'WAITING_JOIN',
                        hostIdx: -1, // 暫定，第一個選角色的人當房主
                        players: ROLES.map(r => ({ ...r, isJoined: false, isDead: true, hand: [], chamber: [], bulletIdx: 0 })),
                        targetCard: '?', currentTurn: -1, lastPlayer: -1, log: '房間已建立'
                    }).then(() => enterSetup(rid));
                } else {
                    if (!data) { alert("找不到該房間！"); return; }
                    if (data.password !== rpw) { alert("密碼錯誤！"); return; }
                    enterSetup(rid);
                }
            });
        }

        function enterSetup(rid) {
            currentRoomId = rid;
            roomRef = db.ref('rooms/' + rid);
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'flex';
            document.getElementById('display-room-info').innerText = `房間：${rid}`;
            document.getElementById('room-tag').innerText = `房間: ${rid}`;
            
            // 開始監聽房間數據
            roomRef.on('value', snap => {
                const data = snap.val();
                if(!data) return;
                updateSetupUI(data);
                if(myIdx !== null) syncGame(data);
            });
        }

        function updateSetupUI(data) {
            const grid = document.getElementById('role-grid');
            grid.innerHTML = '';
            data.players.forEach((p, i) => {
                const btn = document.createElement('button');
                btn.className = `role-btn ${p.isJoined ? 'taken' : ''}`;
                btn.disabled = (p.isJoined || myIdx !== null);
                btn.innerText = p.isJoined ? `${p.emoji} ${p.name}\n(已佔用)` : `${p.emoji} ${p.name}`;
                btn.onclick = () => tryJoin(i);
                grid.appendChild(btn);
            });
        }

        function tryJoin(idx) {
            roomRef.child('players').child(idx).transaction((p) => {
                if (p && p.isJoined) return;
                return { ...p, isJoined: true, isDead: false };
            }, (err, committed) => {
                if (committed) {
                    myIdx = idx;
                    // 如果房間還沒有房主，我就是房主
                    roomRef.once('value', s => {
                        if(s.val().hostIdx === -1) {
                            roomRef.child('hostIdx').set(myIdx);
                            isHost = true;
                        }
                    });
                    
                    document.getElementById('my-id-label').innerText = `身分：${ROLES[idx].emoji}${ROLES[idx].name}`;
                    document.getElementById('setup-screen').style.display = 'none';
                    document.getElementById('game-screen').style.display = 'flex';
                    
                    // 斷線處理
                    roomRef.child('players').child(idx).child('isJoined').onDisconnect().set(false);
                }
            });
        }

        // --- 2. 遊戲核心邏輯 (房主權限) ---
        function masterAction() {
            if(!isHost) return;
            roomRef.once('value', s => {
                const data = s.val();
                const aliveIndices = data.players.map((p,i) => (p.isJoined && !p.isDead) ? i : -1).filter(i=>i!==-1);
                if(aliveIndices.length < 2) { alert("活著的玩家不足2人！"); return; }

                // 洗牌邏輯 (同你之前的版本)
                const targets = ['Q','K','A'];
                const target = targets[Math.floor(Math.random()*3)];
                let deck = [];
                ['Q','K','A'].forEach(v => { for(let i=0; i<6; i++) deck.push({ v, s:['♠','♥','♦','♣'][i%4] }); });
                for(let i=0; i<2; i++) deck.push({ v:'J', s:'🃏' });
                deck = deck.sort(() => Math.random() - 0.5);

                data.players.forEach((p, i) => {
                    if(p.isJoined && !p.isDead) {
                        p.hand = deck.splice(0, 5);
                        if(!p.chamber || p.chamber.length === 0) {
                            p.chamber = [0,0,0,0,0,0]; p.chamber[Math.floor(Math.random()*6)] = 1;
                        }
                    }
                });

                data.state = 'PLAYING';
                data.targetCard = target;
                data.currentTurn = aliveIndices[0];
                data.lastPlayer = -1;
                data.lastPlayed = [];
                data.log = `房主重整戰場！Table 是 ${target}`;
                roomRef.set(data);
            });
        }

        function syncGame(data) {
            isHost = (data.hostIdx === myIdx);
            document.getElementById('host-panel').style.display = isHost ? 'block' : 'none';
            document.getElementById('target-display').innerText = data.targetCard;
            document.getElementById('sys-msg').innerText = data.log;

            // 更新玩家清單
            const grid = document.getElementById('player-grid');
            grid.innerHTML = '';
            data.players.forEach((p, i) => {
                if(!p.isJoined) return;
                const div = document.createElement('div');
                div.className = `p-box ${data.currentTurn === i ? 'active' : ''} ${p.isDead ? 'dead' : ''}`;
                div.innerHTML = `<div style="font-size:1.5rem">${p.emoji}</div><div style="font-size:0.7rem; font-weight:900;">${p.name}${data.hostIdx===i?'(房主)':''}</div>`;
                grid.appendChild(div);
            });

            // 手牌顯示 (同之前)
            const me = data.players[myIdx];
            const handDiv = document.getElementById('my-hand');
            handDiv.innerHTML = '';
            if(me && me.hand && !me.isDead) {
                me.hand.forEach((card, i) => {
                    const isSelected = selectedIndices.includes(i);
                    const cDiv = document.createElement('div');
                    cDiv.className = `card ${(card.s==='♥'||card.s==='♦')?'red':''} ${isSelected?'selected':''}`;
                    cDiv.innerHTML = `<div>${card.v}</div><div style="align-self:center;font-size:1.2rem">${card.s}</div><div style="transform:rotate(180deg)">${card.v}</div>`;
                    cDiv.onclick = () => {
                        if(isSelected) selectedIndices = selectedIndices.filter(x => x !== i);
                        else if(selectedIndices.length < 3) selectedIndices.push(i);
                        document.getElementById('btn-play').innerText = `出牌 (${selectedIndices.length})`;
                        syncGame(data);
                    };
                    handDiv.appendChild(cDiv);
                });
            }

            const myTurn = (data.currentTurn === myIdx && data.state === 'PLAYING');
            document.getElementById('btn-play').disabled = !myTurn;
            document.getElementById('btn-liar').disabled = (!myTurn || data.lastPlayer === -1);
            
            if(data.shooting) runExecutionSequence(data.shooting);
        }

        // 其餘 callLiar, playCards, runExecutionSequence 等邏輯與原本相同，只需確保使用 roomRef 即可。
        function playCards() {
            if(selectedIndices.length === 0) return;
            roomRef.once('value', s => {
                const data = s.val();
                const p = data.players[myIdx];
                const played = [];
                selectedIndices.sort((a,b)=>b-a).forEach(i => played.push(p.hand.splice(i,1)[0]));
                data.lastPlayed = played;
                data.lastPlayer = myIdx;
                data.currentTurn = getNextAlive(data.players, myIdx);
                data.log = `${ROLES[myIdx].name} 出了 ${played.length} 張牌`;
                selectedIndices = [];
                roomRef.set(data);
            });
        }

        function callLiar() {
            roomRef.once('value', s => {
                const data = s.val();
                const isLie = data.lastPlayed.some(c => c.v !== data.targetCard && c.v !== 'J');
                const vicIdx = isLie ? data.lastPlayer : myIdx;
                const p = data.players[vicIdx];
                const hit = p.chamber[p.bulletIdx] === 1;
                p.bulletIdx++;
                if(hit) p.isDead = true;
                data.shooting = { victims: [vicIdx], results: {[vicIdx]: hit} };
                data.log = isLie ? "🤥 抓到吹牛！" : "✅ 他說的是真話！";
                roomRef.set(data);
            });
        }

        function getNextAlive(players, current) {
            let next = (current + 1) % 6;
            while(!players[next].isJoined || players[next].isDead) next = (next + 1) % 6;
            return next;
        }

        async function runExecutionSequence(shootingObj) {
            const overlay = document.getElementById('execution-overlay');
            overlay.style.display = 'flex';
            const vIdx = shootingObj.victims[0];
            document.getElementById('exe-avatar').innerText = ROLES[vIdx].emoji;
            await new Promise(r => setTimeout(r, 1500));
            document.getElementById('exe-status').innerText = shootingObj.results[vIdx] ? "BOOM! DEAD" : "CLICK... SAFE";
            await new Promise(r => setTimeout(r, 1500));
            overlay.style.display = 'none';
            if(isHost) roomRef.child('shooting').remove();
        }
    </script>
</body>
</html>
